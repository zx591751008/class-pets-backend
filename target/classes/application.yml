server:
  port: 8080

spring:
  application:
    name: class-pets-backend
  datasource:
    url: jdbc:mysql://localhost:3306/class_points?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Flyway Migration Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0.0.1
    # Ensure it uses the correct locations
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    timeout: 2000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

file:
  upload-dir: uploads

jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-change-in-prod-32-bytes-min}
  expiration: 14400000

growth:
  level-thresholds: [0, 100, 250, 450, 700, 1000, 1400, 1900, 2500, 3200, 4000]
  overflow-step: 800
  exp-gain-ratio: 10.0
